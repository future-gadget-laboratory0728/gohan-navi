<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="MY LIST">
    <title>MY LIST MANAGER - 複数リスト管理</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif;
            padding: 20px;
            min-height: 100vh;
            background: linear-gradient(135deg, #fef5e7 0%, #f4e4c1 50%, #fef5e7 100%);
            transition: all 0.5s ease;
        }

        body.night-mode {
            background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
            padding: 40px 20px;
        }

        h1 {
            font-size: 3em;
            font-weight: 800;
            margin-bottom: 10px;
            color: #1a3a1a;
            transition: all 0.5s ease;
        }

        body.night-mode h1 {
            background: linear-gradient(90deg, #d4a574 0%, #ffffff 50%, #d4a574 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            font-size: 1.1em;
            color: #666;
            margin-bottom: 30px;
            transition: all 0.5s ease;
        }

        body.night-mode .subtitle {
            color: #bbb;
        }

        .list-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .list-card {
            background: white;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.1);
            transition: all 0.4s ease;
            cursor: pointer;
            text-decoration: none;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        body.night-mode .list-card {
            background: #2d2d2d;
            box-shadow: 0 4px 16px rgba(0,0,0,0.3);
        }

        .list-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 12px 32px rgba(0,0,0,0.15);
        }

        .list-card h2 {
            font-size: 1.8em;
            color: #1a3a1a;
            transition: all 0.5s ease;
        }

        body.night-mode .list-card h2 {
            color: white;
        }

        .list-card p {
            color: #666;
            font-size: 0.95em;
            line-height: 1.6;
            transition: all 0.5s ease;
        }

        body.night-mode .list-card p {
            color: #bbb;
        }

        .list-card-link {
            display: inline-block;
            margin-top: auto;
            padding: 12px 20px;
            background: #d4a574;
            color: white;
            text-decoration: none;
            border-radius: 6px;
            font-weight: 600;
            transition: all 0.3s ease;
            text-align: center;
        }

        .list-card-link:hover {
            background: #c89460;
            transform: scale(1.05);
        }

        .add-new-card {
            background: white;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.1);
            transition: all 0.4s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 200px;
            border: 2px dashed #d4a574;
            cursor: pointer;
        }

        body.night-mode .add-new-card {
            background: #2d2d2d;
            box-shadow: 0 4px 16px rgba(0,0,0,0.3);
        }

        .add-new-card:hover {
            border-color: #c89460;
            background: #f9f9f9;
            transform: scale(1.02);
        }

        body.night-mode .add-new-card:hover {
            background: #333;
        }

        .add-new-button {
            text-align: center;
            cursor: pointer;
        }

        .add-new-button-icon {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .add-new-button-text {
            font-size: 1.1em;
            font-weight: 600;
            color: #d4a574;
        }

        footer {
            text-align: center;
            padding: 20px;
            color: #999;
            font-size: 0.9em;
            transition: all 0.5s ease;
        }

        body.night-mode footer {
            color: #666;
        }

        @media (max-width: 768px) {
            h1 { font-size: 2em; }
            .list-grid { grid-template-columns: 1fr; }
        }

        @supports (padding: max(0px)) {
            body {
                padding-left: max(12px, env(safe-area-inset-left));
                padding-right: max(12px, env(safe-area-inset-right));
                padding-bottom: max(12px, env(safe-area-inset-bottom));
            }
        }

        /* ===== モーダル ===== */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 12px;
            padding: 30px;
            max-width: 500px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            box-shadow: 0 4px 16px rgba(0,0,0,0.15);
            transition: all 0.5s ease;
        }

        body.night-mode .modal-content {
            background: #2d2d2d;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .modal-header h2 {
            font-size: 1.5em;
            font-weight: 700;
            color: #1a3a1a;
            margin: 0;
            transition: all 0.5s ease;
        }

        body.night-mode .modal-header h2 {
            color: white;
        }

        .modal-close {
            background: none;
            border: none;
            font-size: 1.5em;
            cursor: pointer;
            color: #999;
            transition: all 0.3s ease;
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-close:hover {
            color: #1a3a1a;
        }

        body.night-mode .modal-close:hover {
            color: white;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: #1a3a1a;
            font-size: 0.95em;
            transition: all 0.5s ease;
        }

        body.night-mode .form-group label {
            color: white;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1em;
            font-family: inherit;
            transition: all 0.3s ease;
            background: white;
            color: #1a1a1a;
        }

        body.night-mode .form-group input {
            background: #1a1a1a;
            color: white;
            border-color: #444;
        }

        .form-group input:focus {
            outline: none;
            border-color: #d4a574;
            box-shadow: 0 0 8px rgba(212, 165, 116, 0.2);
        }

        .emoji-selector {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin: 12px 0;
        }

        .emoji-btn {
            padding: 12px;
            border: 2px solid #e0e0e0;
            background: white;
            border-radius: 8px;
            font-size: 1.5em;
            cursor: pointer;
            transition: all 0.3s ease;
            border: none;
            background: #f5f5f5;
        }

        body.night-mode .emoji-btn {
            background: #1a1a1a;
            border: 2px solid #444;
        }

        .emoji-btn:hover {
            transform: scale(1.1);
            border-color: #d4a574;
        }

        .emoji-btn.selected {
            background: #d4a574;
            transform: scale(1.2);
        }

        .selected-emoji {
            font-size: 0.85em;
            color: #d4a574;
            margin-top: 8px;
            font-weight: 600;
        }

        .form-actions {
            display: flex;
            gap: 10px;
            margin-top: 24px;
        }

        .btn-submit {
            flex: 1;
            padding: 12px;
            background: #d4a574;
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.95em;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        .btn-submit:active {
            background: #c89460;
            transform: scale(0.98);
        }

        .btn-cancel {
            flex: 1;
            padding: 12px;
            background: #f0f0f0;
            color: #1a1a1a;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.95em;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        body.night-mode .btn-cancel {
            background: #1a1a1a;
            color: white;
            border-color: #444;
        }

        .btn-cancel:active {
            background: #e0e0e0;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>MY LIST</h1>
            <p class="subtitle">複数のリストを一元管理</p>
        </header>

        <div class="list-grid">
            <a href="restaurants.html" class="list-card">
                <h2>🍽️ GOhan NAVI</h2>
                <p>行きたいお店を一つのリストで管理。自動判定される営業状況で迷わない</p>
                <div class="list-card-link">飲食店リストへ →</div>
            </a>

            <a href="hotels.html" class="list-card">
                <h2>🏨 泊まる</h2>
                <p>泊まってみたい宿をリスト化。エリア別に検索できる</p>
                <div class="list-card-link">宿泊施設リストへ →</div>
            </a>

            <a href="travel-spots.html" class="list-card">
                <h2>✈️ 旅する</h2>
                <p>行きたい場所を記録。地域ごとに候補をまとめる</p>
                <div class="list-card-link">旅行スポットリストへ →</div>
            </a>

            <div class="add-new-card" onclick="openAddListModal()">
                <div class="add-new-button">
                    <div class="add-new-button-icon">+</div>
                    <div class="add-new-button-text">新しいリストを追加</div>
                </div>
            </div>
        </div>

        <footer>
            <p>© 2026 MY LIST MANAGER - シンプルで拡張可能なリスト管理プラットフォーム</p>
        </footer>
    </div>

    <!-- 新規リスト追加モーダル -->
    <div class="modal" id="addListModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>新しいリストを追加</h2>
                <button class="modal-close" onclick="closeAddListModal()">✕</button>
            </div>
            <form id="addListForm" onsubmit="handleAddList(event)">
                <div class="form-group">
                    <label>リスト名 *</label>
                    <input type="text" id="listName" required placeholder="例：行きたい映画館">
                </div>
                <div class="form-group">
                    <label>説明</label>
                    <input type="text" id="listDescription" placeholder="例：見たい映画をリスト化">
                </div>
                <div class="form-group">
                    <label>絵文字を選択</label>
                    <div class="emoji-selector">
                        <button type="button" class="emoji-btn" data-emoji="🎬" onclick="selectEmoji('🎬')">🎬</button>
                        <button type="button" class="emoji-btn" data-emoji="📚" onclick="selectEmoji('📚')">📚</button>
                        <button type="button" class="emoji-btn" data-emoji="🛍️" onclick="selectEmoji('🛍️')">🛍️</button>
                        <button type="button" class="emoji-btn" data-emoji="🎮" onclick="selectEmoji('🎮')">🎮</button>
                        <button type="button" class="emoji-btn" data-emoji="🎨" onclick="selectEmoji('🎨')">🎨</button>
                        <button type="button" class="emoji-btn" data-emoji="🍰" onclick="selectEmoji('🍰')">🍰</button>
                        <button type="button" class="emoji-btn" data-emoji="✏️" onclick="selectEmoji('✏️')">✏️</button>
                        <button type="button" class="emoji-btn" data-emoji="⭐" onclick="selectEmoji('⭐')">⭐</button>
                    </div>
                    <input type="hidden" id="selectedEmoji" value="⭐">
                    <p class="selected-emoji" id="selectedEmojiDisplay">選択: ⭐</p>
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn-submit">作成</button>
                    <button type="button" class="btn-cancel" onclick="closeAddListModal()">キャンセル</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // ===== ダークモード =====
        function checkTimeMode() {
            const now = new Date();
            const hours = now.getHours();
            const isNight = hours >= 18 || hours < 6;
            
            if (isNight) {
                document.body.classList.add('night-mode');
            } else {
                document.body.classList.remove('night-mode');
            }
        }

        // ===== 新規リスト追加 =====
        function openAddListModal() {
            document.getElementById('addListModal').classList.add('active');
            document.getElementById('listName').focus();
        }

        function closeAddListModal() {
            document.getElementById('addListModal').classList.remove('active');
            document.getElementById('addListForm').reset();
            document.getElementById('selectedEmoji').value = '⭐';
            document.getElementById('selectedEmojiDisplay').textContent = '選択: ⭐';
            document.querySelectorAll('.emoji-btn').forEach(btn => btn.classList.remove('selected'));
            document.querySelector('[data-emoji="⭐"]').classList.add('selected');
        }

        function selectEmoji(emoji) {
            document.querySelectorAll('.emoji-btn').forEach(btn => btn.classList.remove('selected'));
            event.target.classList.add('selected');
            document.getElementById('selectedEmoji').value = emoji;
            document.getElementById('selectedEmojiDisplay').textContent = '選択: ' + emoji;
        }

        function handleAddList(event) {
            event.preventDefault();
            const listName = document.getElementById('listName').value.trim();
            const listDescription = document.getElementById('listDescription').value.trim();
            const selectedEmoji = document.getElementById('selectedEmoji').value;

            if (listName) {
                alert(`✅ 「${selectedEmoji} ${listName}」リストを追加しました！\n\n${listDescription ? '説明: ' + listDescription + '\n\n' : ''}※ この機能は今後実装予定です。\n現在は「飲食店」「宿泊施設」「旅行スポット」の\n3つのリストでご利用ください。`);
                closeAddListModal();
            }
        }

        checkTimeMode();
        setInterval(checkTimeMode, 60000);
    </script>
</body>
</html>
